---
layout: common
---
<article class="page-content">

	{%- if page.title and page.url == "/" -%}
	<h2 id="{{ page.title | slugify }}" class="page-title">{{ page.title }}</h2>
	{%- elsif page.title -%}
	<h1 id="{{ page.title | slugify }}" class="page-title">{{ page.title }}</h1>
	{%- endif -%}

	{%- if page.subtitle -%}
	<p class="page-subtitle">{{ page.subtitle }}</p>
	{%- endif -%}

	{{ content }}
</article>
