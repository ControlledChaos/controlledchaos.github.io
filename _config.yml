
# Website settings
url: "https://controlledchaos.github.io"
is_user_page: true
is_project_page: false
remote_theme: theme-ccdzine
title: Controlled Chaos Design
description: Custom website design and build. Free products to build your own.
author: Controlled Chaos Design
email: gregsweet4@yahoo.com
site_icon: "site-icon.png"
site_image: site-image.jpg
site_thumb: site-thumb.jpg
timezone: "America/Los Angeles"
markdown: kramdown
permalink: pretty

# Layout
body_class: "default-page"
page_type: "WebPage"
page_sidebar: true

# Specific defaults
defaults:
  - scope:
      path: "" # empty string == all files in project.
      type: "posts"
    values:
      permalink: /posts/:title/
      layout: "post"
      comments: true
      post_image: false # Fallback in templates.
      post_thumb: false # Fallback in templates.
      post_gallery: false # Heading to return true.
      related_posts: Related Posts # Heading to return true.
      toc: true
  - scope:
      path: "" # empty string == all files in project.
      type: "projects"
    values:
      permalink: /projects/:title/
      layout: "default"
      post_image: false # Fallback in templates.
      post_thumb: false # Fallback in templates.
  - scope:
      path: "" # empty string == all files in project.
      type: "pages"
    values:
      layout: "page"
      page_image: false # Fallback in templates.
      page_thumb: false # Fallback in templates.

# Primary navigation entries
site_nav:
  - name: Services
    url: /services
  - name: Projects
    url: /projects
  - name: Products
    url: /products
  - name: Posts
    url: /posts
  - name: About
    url: /about
  - name: Contact
    url: /contact

# Featured projects
featured_projects: [
  configure-8,
  bloomosphere,
  totem-website,
  new-acf,
  sitecore,
  monica-mixes
]

# Blog pages
blog_view: preview # preview, grid, or full
posts_permalink: /posts
paginate: 3
paginate_path: "/posts/page:num/"
category_path: /category/
category_layout: category_index.html
tag_page_layout: tags
tag_page_dir: tags
related_by: "tags or categories"

# Collections
collections:
  - projects

# Sidebar content
sidebar_modules:
  latest-posts

# Additional functionality
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-target-blank
  - jekyll-gist
  - jekyll-toc
  - jemoji
