url: "https://controlledchaos.github.io"
is_user_page: true
is_project_page: false
remote_theme: theme-ccdzine

title: Controlled Chaos Design
description: Custom website design and build. Free products to build your own.
author: Controlled Chaos Design
email: gregsweet4@yahoo.com

avatar: "site-icon.png"
cover_img: zen-garden.jpg
share_img: zen-garden.jpg

timezone: "America/Los Angeles"
markdown: kramdown
permalink: pretty

defaults:
  - scope:
      path: "" # an empty string here means all files in the project
      type: "posts"
    values:
      permalink: /posts/:title/
      layout: "post"
      comments: true
      image: /assets/img/default-cover.jpg
      toc: true
  - scope:
      path: "" # an empty string here means all files in the project
      type: "pages"
    values:
      layout: "page"
      image: /assets/img/default-cover.jpg

site_nav:
  - name: Services
    url: /services
  - name: Projects
    url: /projects
  - name: Products
    url: /products
  - name: Posts
    url: /posts
  - name: About
    url: /about
  - name: Contact
    url: /contact

blog_view: preview
paginate: 3
paginate_path: "/posts/page:num/"
category_path: category
category_layout: category_layout.html
tag_page_layout: tags
tag_page_dir: tags
related_by: "tags or categories"

collections:
  projects:
    paginate: 3
    output: true
    permalink: /projects/:name/

sidebar_modules:
  latest-posts

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-target-blank
  - jekyll-gist
  - jekyll-toc
  - jemoji
